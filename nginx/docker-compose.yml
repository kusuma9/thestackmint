networks:
  infra-net:
    external: true
  personal-net:
    external: true
  saas-net:
    external: true

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    networks:
      - infra-net
      - personal-net
      - saas-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./snippets:/etc/nginx/snippets:ro
      - letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # One-shot container — invoke manually, not a long-running service
  # Issue cert:   docker compose run --rm certbot
  # Renew cert:   docker compose run --rm certbot renew && docker compose exec nginx nginx -s reload
  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: certbot
    restart: "no"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./cloudflare.ini:/etc/cloudflare.ini:ro
    command: >
      certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/cloudflare.ini
      --email ${ACME_EMAIL}
      --agree-tos
      --no-eff-email
      --non-interactive
      -d "mystackmint.com"
      -d "*.mystackmint.com"
      --keep-until-expiring

volumes:
  letsencrypt:
    name: letsencrypt
  nginx_logs:
    name: nginx-logs
