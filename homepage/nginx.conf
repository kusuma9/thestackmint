server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml font/woff2;

    # Cache static assets aggressively (Astro uses content-hashed filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Favicon + robots
    location ~* \.(ico|svg|webmanifest)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Proxy Uptime Kuma status API to avoid CORS in the browser
    # Slug is set via UPTIME_KUMA_SLUG env var (default: "default")
    location /api/status {
        proxy_pass http://uptime-kuma:3001/api/status-page/heartbeat/${UPTIME_KUMA_SLUG};
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";

        # Security headers (Traefik also applies these; belt-and-suspenders)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
