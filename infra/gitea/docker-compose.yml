networks:
  infra-net:
    external: true

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    networks:
      - infra-net
    ports:
      - "127.0.0.1:8019:3000"
      - "2223:22"   # Gitea SSH on host port 2223 (avoids conflict with system SSH on 2222)
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${DB_PASSWORD}
      - GITEA__server__DOMAIN=git.mystackmint.com
      - GITEA__server__ROOT_URL=https://git.mystackmint.com
      - GITEA__server__SSH_DOMAIN=git.mystackmint.com
      - GITEA__server__SSH_PORT=2223
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA__log__LEVEL=Warn
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      gitea-db:
        condition: service_healthy

  gitea-db:
    image: postgres:16-alpine
    container_name: gitea-db
    restart: unless-stopped
    networks:
      - infra-net
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - gitea_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    container_name: woodpecker-server
    restart: unless-stopped
    networks:
      - infra-net
    ports:
      - "127.0.0.1:8020:8000"
    environment:
      - WOODPECKER_OPEN=false
      - WOODPECKER_GITEA=true
      - WOODPECKER_GITEA_URL=https://git.mystackmint.com
      - WOODPECKER_GITEA_CLIENT=${WOODPECKER_GITEA_CLIENT}
      - WOODPECKER_GITEA_SECRET=${WOODPECKER_GITEA_SECRET}
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
      - WOODPECKER_HOST=https://ci.mystackmint.com
      - WOODPECKER_DATABASE_DRIVER=postgres
      - WOODPECKER_DATABASE_DATASOURCE=postgres://woodpecker:${WP_DB_PASSWORD}@woodpecker-db:5432/woodpecker?sslmode=disable
    depends_on:
      woodpecker-db:
        condition: service_healthy

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    container_name: woodpecker-agent
    restart: unless-stopped
    networks:
      - infra-net
    environment:
      - WOODPECKER_SERVER=woodpecker-server:9000
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET}
      - WOODPECKER_MAX_WORKFLOWS=4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - woodpecker-server

  woodpecker-db:
    image: postgres:16-alpine
    container_name: woodpecker-db
    restart: unless-stopped
    networks:
      - infra-net
    environment:
      - POSTGRES_DB=woodpecker
      - POSTGRES_USER=woodpecker
      - POSTGRES_PASSWORD=${WP_DB_PASSWORD}
    volumes:
      - woodpecker_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodpecker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gitea_data:
  gitea_db:
  woodpecker_db:
