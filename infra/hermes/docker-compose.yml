networks:
  hermes-net:
    driver: bridge
  coolify:
    external: true

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: ["gateway", "run"]
    restart: unless-stopped
    networks:
      - hermes-net
    volumes:
      - hermes-agent-data:/opt/data
    environment:
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_ENABLED=true
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8642/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hermes-net
      - coolify
    ports:
      - "127.0.0.1:8024:3000"
    volumes:
      - hermes-agent-data:/home/workspace/.hermes
      - hermes-workspace-files:/workspace
    environment:
      - HERMES_API_URL=http://hermes-agent:8642
      - HERMES_DASHBOARD_URL=http://hermes-agent:9119
      - COOKIE_SECURE=true
      - TRUST_PROXY=1
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.mystackmint.com`)"
      - "traefik.http.routers.hermes.entrypoints=https"
      - "traefik.http.routers.hermes.tls=true"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=3000"
      - "traefik.http.routers.hermes.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"

volumes:
  hermes-agent-data:
  hermes-workspace-files:
