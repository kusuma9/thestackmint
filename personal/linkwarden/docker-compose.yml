networks:
  personal-net:
    external: true
  coolify:
    external: true

services:
  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: linkwarden
    restart: unless-stopped
    networks:
      - personal-net
      - coolify
    ports:
      - "127.0.0.1:8016:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkwarden.rule=Host(`links.mystackmint.com`)"
      - "traefik.http.routers.linkwarden.entrypoints=https"
      - "traefik.http.routers.linkwarden.tls=true"
      - "traefik.http.routers.linkwarden.tls.certresolver=letsencrypt"
      - "traefik.http.services.linkwarden.loadbalancer.server.port=3000"
      - "traefik.http.routers.linkwarden.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"
    environment:
      - DATABASE_URL=postgresql://linkwarden:${DB_PASSWORD}@linkwarden-db:5432/linkwarden
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://links.mystackmint.com
      - NEXT_PUBLIC_DISABLE_REGISTRATION=true
    volumes:
      - linkwarden_data:/data/data
    depends_on:
      linkwarden-db:
        condition: service_healthy

  linkwarden-db:
    image: postgres:16-alpine
    container_name: linkwarden-db
    restart: unless-stopped
    networks:
      - personal-net
    environment:
      - POSTGRES_DB=linkwarden
      - POSTGRES_USER=linkwarden
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - linkwarden_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkwarden"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  linkwarden_data:
  linkwarden_db:
