# SaaS App Template
# Usage: bash /srv/mystackmint/saas/new-saas-app.sh APP_NAME
# Replace all occurrences of APP_NAME with your actual app name before deploying.
# Replace APP_PORT with a unique host port (8100+ for SaaS apps).
# After deploying, add nginx/sites-available/APP_NAME config and run: sudo bash nginx/install.sh

networks:
  APP_NAME-net:
    name: APP_NAME-net
    driver: bridge

services:
  # --- Frontend (Next.js) ---
  APP_NAME-web:
    image: APP_NAME-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: APP_NAME-web
    restart: unless-stopped
    networks:
      - APP_NAME-net
    ports:
      - "127.0.0.1:APP_PORT:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://APP_NAME.mystackmint.com/api
      - DATABASE_URL=postgresql://APP_NAME:${DB_PASSWORD}@APP_NAME-db:5432/APP_NAME
      - REDIS_URL=redis://APP_NAME-redis:6379
    depends_on:
      APP_NAME-db:
        condition: service_healthy
      APP_NAME-redis:
        condition: service_healthy
    labels:
      # Disable Watchtower auto-update (CI handles deploys)
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Database (PostgreSQL) ---
  APP_NAME-db:
    image: postgres:16-alpine
    container_name: APP_NAME-db
    restart: unless-stopped
    networks:
      - APP_NAME-net
    environment:
      - POSTGRES_DB=APP_NAME
      - POSTGRES_USER=APP_NAME
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - APP_NAME_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U APP_NAME -d APP_NAME"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache (Redis) ---
  APP_NAME-redis:
    image: redis:7-alpine
    container_name: APP_NAME-redis
    restart: unless-stopped
    networks:
      - APP_NAME-net
    command: --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - APP_NAME_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  APP_NAME_db_data:
  APP_NAME_redis_data:
