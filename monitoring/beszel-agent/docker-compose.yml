# Beszel agent for the Contabo VPS — WebSocket mode: the agent dials OUT
# to the hub over HTTPS (Contabo's upstream network filters inbound 45876,
# so the hub cannot dial in). TOKEN is issued by the hub (universal token
# or per-system fingerprint token).
services:
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: "45876"
      KEY: "${BESZEL_AGENT_KEY}"
      HUB_URL: "https://monitor.mystackmint.com"
      TOKEN: "${BESZEL_AGENT_TOKEN}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
