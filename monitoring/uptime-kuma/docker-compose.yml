networks:
  infra-net:
    external: true
  coolify:
    external: true

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - infra-net
      - coolify
    ports:
      - "127.0.0.1:8026:3001"
    volumes:
      - uptime-kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptimekuma.rule=Host(`uptime.mystackmint.com`)"
      - "traefik.http.routers.uptimekuma.entrypoints=https"
      - "traefik.http.routers.uptimekuma.tls=true"
      - "traefik.http.routers.uptimekuma.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptimekuma.loadbalancer.server.port=3001"
      - "traefik.http.routers.uptimekuma.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"

volumes:
  uptime-kuma_data:
