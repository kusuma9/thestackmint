networks:
  personal-net:
    external: true
  coolify:
    external: true

services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    networks:
      - personal-net
      - coolify
    ports:
      - "127.0.0.1:8012:5006"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.actual-budget.rule=Host(`budget.mystackmint.com`)"
      - "traefik.http.routers.actual-budget.entrypoints=https"
      - "traefik.http.routers.actual-budget.tls=true"
      - "traefik.http.routers.actual-budget.tls.certresolver=letsencrypt"
      - "traefik.http.services.actual-budget.loadbalancer.server.port=5006"
      - "traefik.http.routers.actual-budget.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"
    volumes:
      - actual_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5006', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  actual_data:
