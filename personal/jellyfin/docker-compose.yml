networks:
  personal-net:
    external: true

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - personal-net
    ports:
      - "127.0.0.1:8007:8096"
    environment:
      - JELLYFIN_PublishedServerUrl=https://media.mystackmint.com
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /media/movies:/media/movies:ro
      - /media/tv:/media/tv:ro
      - /media/music:/media/music:ro
    # Optional: GPU transcoding (uncomment for Intel QuickSync)
    # devices:
    #   - /dev/dri/renderD128:/dev/dri/renderD128
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  jellyfin_config:
  jellyfin_cache:
