services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.mystackmint.com
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - /mnt/homelaptop/Movies:/media/movies:ro
      - /mnt/homelaptop/Audio:/media/music:ro
      - /mnt/homelaptop/ShowSeries:/media/series:ro
      - /mnt/homelaptop/VideoSongs:/media/videosongs:ro
      - /mnt/homelaptop/Comedies:/media/comedies:ro
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.mystackmint.com`)"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=coolify"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  jellyfin-config:
  jellyfin-cache:

networks:
  coolify:
    external: true
