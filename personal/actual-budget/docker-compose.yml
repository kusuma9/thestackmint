networks:
  personal-net:
    external: true

services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    networks:
      - personal-net
    ports:
      - "127.0.0.1:8012:5006"
    volumes:
      - actual_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5006', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  actual_data:
