networks:
  hermes-net:
    name: hermes-net
    driver: bridge
  coolify:
    external: true

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: ["gateway", "run"]
    restart: unless-stopped
    networks:
      - hermes-net
      - coolify
    ports:
      - "127.0.0.1:8026:8642"
    volumes:
      - hermes_agent_data:/opt/data
    environment:
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${API_SERVER_KEY}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8642/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-agent.rule=Host(`hermes.mystackmint.com`)"
      - "traefik.http.routers.hermes-agent.entrypoints=https"
      - "traefik.http.routers.hermes-agent.tls=true"
      - "traefik.http.routers.hermes-agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes-agent.loadbalancer.server.port=9119"
      - "traefik.http.routers.hermes-agent.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes-workspace
    user: root
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hermes-net
      - coolify
    ports:
      - "127.0.0.1:8024:3000"
    volumes:
      - hermes_agent_data:/home/workspace/.hermes
      - hermes_workspace_files:/workspace
    environment:
      - HERMES_HOME=/home/workspace/.hermes
      - HERMES_WORKSPACE_DIR=/workspace
      - HERMES_API_URL=http://hermes-agent:8642
      - HERMES_DASHBOARD_URL=http://hermes-agent:9119
      - HERMES_API_TOKEN=${API_SERVER_KEY}
      - HERMES_PASSWORD=${HERMES_PASSWORD}
      - COOKIE_SECURE=true
      - TRUST_PROXY=1
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermesworkspace.rule=Host(`hermesworkspace.mystackmint.com`)"
      - "traefik.http.routers.hermesworkspace.entrypoints=https"
      - "traefik.http.routers.hermesworkspace.tls=true"
      - "traefik.http.routers.hermesworkspace.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermesworkspace.loadbalancer.server.port=3000"
      - "traefik.http.routers.hermesworkspace.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"

volumes:
  hermes_agent_data:
  hermes_workspace_files:
