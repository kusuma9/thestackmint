networks:
  personal-net:
    external: true
  coolify:
    external: true

services:
  jellyfin:
    image: jellyfin/jellyfin:10.8.13
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - personal-net
      - coolify
    ports:
      - "127.0.0.1:8007:8096"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`media.mystackmint.com`)"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.http.routers.jellyfin.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"
    environment:
      - JELLYFIN_PublishedServerUrl=https://media.mystackmint.com
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /media/movies:/media/movies:ro
      - /media/tv:/media/tv:ro
      - /media/music:/media/music:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  jellyfin_config:
  jellyfin_cache:
