# Umami — privacy-respecting analytics for SaaS apps
# Completely isolated from personal data (separate network + volumes)
networks:
  saas-net:
    external: true
  coolify:
    external: true

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    networks:
      - saas-net
      - coolify
    ports:
      - "127.0.0.1:8022:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.umami.rule=Host(`analytics.mystackmint.com`)"
      - "traefik.http.routers.umami.entrypoints=https"
      - "traefik.http.routers.umami.tls=true"
      - "traefik.http.routers.umami.tls.certresolver=letsencrypt"
      - "traefik.http.services.umami.loadbalancer.server.port=3000"
      - "traefik.http.routers.umami.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"
    environment:
      - DATABASE_URL=postgresql://umami:${DB_PASSWORD}@umami-db:5432/umami
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${APP_SECRET}
      - DISABLE_TELEMETRY=1
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    networks:
      - saas-net
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - umami_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  umami_db:
