networks:
  infra-net:
    external: true
  coolify:
    external: true

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    networks:
      - infra-net
      - coolify
    ports:
      - "127.0.0.1:8025:8090"
    volumes:
      - beszel_data:/beszel_data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel.rule=Host(`monitor.mystackmint.com`)"
      - "traefik.http.routers.beszel.entrypoints=https"
      - "traefik.http.routers.beszel.tls=true"
      - "traefik.http.routers.beszel.tls.certresolver=letsencrypt"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"
      - "traefik.http.routers.beszel.middlewares=authelia@docker"
      - "traefik.docker.network=coolify"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    networks:
      - infra-net
    environment:
      LISTEN: "45876"
      KEY: "${BESZEL_AGENT_KEY}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  beszel_data:
