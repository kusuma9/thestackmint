networks:
  personal-net:
    external: true

services:
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    restart: unless-stopped
    networks:
      - personal-net
    ports:
      - "127.0.0.1:8014:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - grocy_data:/config

volumes:
  grocy_data:
