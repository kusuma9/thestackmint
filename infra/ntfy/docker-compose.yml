networks:
  infra-net:
    external: true

services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    networks:
      - infra-net
    ports:
      - "127.0.0.1:8003:80"
    command: serve
    environment:
      - TZ=UTC
    volumes:
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/etc/ntfy
      - ./server.yml:/etc/ntfy/server.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/v1/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  ntfy_cache:
  ntfy_data:
