# Ntfy server configuration
# Docs: https://docs.ntfy.sh/config/

base-url: https://ntfy.mystackmint.com
listen-http: ":80"
behind-proxy: true

# Cache push notifications for 12 hours (allows catching up after phone is offline)
cache-file: /var/cache/ntfy/cache.db
cache-duration: 12h

# Auth — require login to publish and subscribe
# Run: docker exec -it ntfy ntfy user add --role=admin admin
auth-file: /etc/ntfy/user.db
auth-default-access: deny-all

# Topics used by the platform:
#   backup-alerts    — restic backup success/failure (backup.sh)
#   uptime-alerts    — Uptime Kuma downtime notifications
#   update-alerts    — Watchtower container updates
#   security-alerts  — Fail2ban bans, Crowdsec blocks, new Authelia logins
#   deploy-alerts    — Woodpecker CI deployment results
