---
# Authelia Configuration
# Secrets (jwt_secret, session.secret, storage.encryption_key) are
# injected via environment variables in docker-compose.yml

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info
  format: text
  file_path: /config/logs/authelia.log
  keep_stdout: true

telemetry:
  metrics:
    enabled: false

totp:
  issuer: mystackmint.com
  period: 30
  skew: 1

webauthn:
  disable: false
  timeout: 60s
  user_verification: preferred

authentication_backend:
  password_reset:
    disable: false
  refresh_interval: 1m
  file:
    path: /config/users_database.yml
    watch: true
    password:
      algorithm: argon2id
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

password_policy:
  standard:
    enabled: true
    min_length: 12
    max_length: 0
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: false

access_control:
  default_policy: deny
  rules:
    # Public — no authentication required
    - domain: "auth.mystackmint.com"
      policy: bypass
    - domain: "jellyfin.mystackmint.com"
      policy: bypass

    # Admin-only infra tools — 2FA + admin group required
    - domain:
        - "db.mystackmint.com"
        - "portainer.mystackmint.com"
        - "hermes.mystackmint.com"
        - "hermesworkspace.mystackmint.com"
        - "monitor.mystackmint.com"
        - "uptime.mystackmint.com"
      policy: two_factor
      subject: "group:admins"

session:
  name: authelia_session
  same_site: lax
  # Default 4h; admins should NOT tick remember me — 2FA re-auth provides the protection.
  expiration: 4h
  inactivity: 30m
  remember_me: 7d
  cookies:
    - domain: mystackmint.com
      authelia_url: https://auth.mystackmint.com/
  redis:
    host: authelia-redis
    port: 6379
    database_index: 0
    maximum_active_connections: 8
    minimum_idle_connections: 0

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m

storage:
  local:
    path: /config/db/authelia.db

notifier:
  disable_startup_check: false
  filesystem:
    filename: /config/logs/notification.txt
